<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikos Cafe</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#000;
    text-align:center;
    padding:30px;
}

header h1{
    color:#d4af37;
    margin:0;
    font-size:40px;
}

header p{
    color:#ccc;
}

.section{
    padding:20px;
}

h2{
    color:#d4af37;
    border-bottom:2px solid #d4af37;
    padding-bottom:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #333;
    font-size:20px;
}

.price{
    color:#d4af37;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>☕ Nikos Cafe</h1>
<p>Digital Menu</p>
</header>

<div class="section">

<h2>☕ Καφέδες</h2>

<div class="item">
<span>Espresso Μονός</span>
<span class="price">2,00€</span>
</div>

<div class="item">
<span>Espresso Διπλός</span>
<span class="price">2,50€</span>
</div>

<div class="item">
<span>Freddo Espresso</span>
<span class="price">2,80€</span>
</div>

<div class="item">
<span>Cappuccino Μονός</span>
<span class="price">2,50€</span>
</div>

<div class="item">
<span>Cappuccino Διπλός</span>
<span class="price">3,00€</span>
</div>

<div class="item">
<span>Freddo Cappuccino</span>
<span class="price">3,20€</span>
</div>

</div>

</body>
</html>
